<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Mobile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Vend+Sans:ital,wght@0,500;1,500&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>

    <!-- imposto layout di primo livello con app-wrapper d-flex, al cui interno posiziono al suo interno
        central wrapper + footer -->
    <div class="app-wrapper d-flex">
      <div class="central-wrapper d-flex">

        <!-- imposto il secondo livello di layout mettendo a central wrapper d-flex, ed al suo interno 
            sidebar + main -->
        <div class="sidebar">
            <ul class="sidebar-channels d-flex">
                <li class="channel c-discord">
                    <img src="img/logo.webp" alt="logo boolean" class="discord-icon">
                <li class="channel s-arte">
                    <img class="round" src="img/server arte.png" alt="server arte">
                </li>
                <li class="channel s-boolean">
                    <img class="round" src="img/server_boolean.png" alt="server boolean">
                </li>
                <li class="channel s-italia">
                    <img class="round" src="img/server_italia.png" alt="server italia">
                </li>
                <li class="channel s-switch">
                    <img class="round" src="img/server_nintendo.png" alt="server nintendo">
                </li>
                <li class="channel s-js">
                    <img class="round" src="img/server_javascript.png" alt="server javascript">
                </li>
                <li class="channel s-pokemon">
                    <img class="round" src="img/server_pokemon.png" alt="server pokemon">
                </li> 
            </ul> 
        </div>
        <main class="main d-flex">
            <!-- all'interno del main aggiungo il terzo livello di layout, 
                dando al main d-flex e inserendo al suo interno header e
                 chat-list-->
          <div class="header-messaggi">

            <!-- dentro l'header, creo un h2 e i pulsanti per search e add-->
            <h2 class="header-h2">Messaggi</h2>
            <div class="header-buttons">
                <div class="search-icon"></div>
                <button class="add-friends"></button>
            </div>
          </div>
          <div class="chat-list">
            Giuseppe <br />
            Fra <br />
            Peppino
          </div>
        </main>
      </div>
      <footer class="footer">sono il footer</footer>
    </div>
  </body>
</html>
